# configs/joint.yaml
# Stage 3: Joint end-to-end fine-tuning

model:
  backbone: resnet50
  embedding_dim: 256
  oim_num_features: 256
  oim_momentum: 0.5
  oim_scalar: 30.0
  checkpoint: results/reid/best_reid.pth   # warm-start from stage 2

data:
  root: data/PRW
  batch_size: 2
  num_workers: 4
  min_size: 900
  max_size: 1500

optimizer:
  type: SGD
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0005

scheduler:
  type: StepLR
  step_size: 5
  gamma: 0.1

training:
  epochs: 10
  clip_grad_norm: 10.0
  log_interval: 50
  save_dir: results/joint
  val_interval: 1

# loss weights
loss:
  detection_weight: 1.0
  reid_weight: 0.5
