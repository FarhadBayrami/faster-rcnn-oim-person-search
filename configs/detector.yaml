# configs/detector.yaml
# Stage 1: Pedestrian Detector Training

model:
  backbone: resnet50        # resnet50 | resnet101
  pretrained: true          # use COCO-pretrained weights
  num_classes: 2            # background + pedestrian
  min_size: 900
  max_size: 1500

data:
  root: data/PRW
  batch_size: 2
  num_workers: 4
  # augmentations
  horizontal_flip: true
  random_brightness: 0.2

optimizer:
  type: SGD
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005

scheduler:
  type: StepLR
  step_size: 8
  gamma: 0.1

training:
  epochs: 15
  clip_grad_norm: 10.0
  log_interval: 50           # steps
  save_dir: results/detector
  val_interval: 1            # every N epochs
